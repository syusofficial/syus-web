# Dependabot 설정
# 의존성 업데이트를 매주 자동으로 감지하고 Pull Request를 생성합니다.
# 참고: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # ── npm 패키지 (package.json) ──
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Seoul"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
      include: "scope"
    labels:
      - "dependencies"
    groups:
      # Next.js / React 관련은 한 PR로 묶기
      next-react:
        patterns:
          - "next"
          - "react"
          - "react-dom"
          - "@types/react*"
          - "eslint-config-next"
      # Supabase 관련은 한 PR로 묶기
      supabase:
        patterns:
          - "@supabase/*"
      # 나머지 minor / patch 업데이트는 전부 하나로 묶기
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
    ignore:
      # major 버전 업은 수동 검토 (파괴적 변경 가능성)
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # ── GitHub Actions (workflow 파일이 생기면 자동 감지) ──
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Seoul"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "ci"
    labels:
      - "dependencies"
      - "github-actions"
